context:
  version: "1.0.5"

package:
  name: beads
  version: ${{ version }}

source:
  - url: https://github.com/gastownhall/beads/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 06e52a953b2e46044c70bc41421554c5d006370b1a25905b752d02eb0b337f0d
  # the following dependencies miss standard license file layout, so we have to manually add their license files
  - url: https://raw.githubusercontent.com/mattn/go-localereader/master/LICENSE
    sha256: dceede03550621e65ec7b79fcba87cf6dbb9d31132a8ae71a8fe8ceec0af7da3
    target_directory: library_licenses_2/github.com/mattn/go-localereader
  - url: https://raw.githubusercontent.com/apache/arrow-go/main/LICENSE.txt
    sha256: ff2fe52b8dfd2574c6ea7f0c407948c857f62672c2a3a9a17083ee10af8067ef
    target_directory: library_licenses_2/github.com/apache/arrow-go
  - url: https://raw.githubusercontent.com/apache/thrift/master/LICENSE
    sha256: 89aa7b27868669299bd8a6c53b72ec4beadce42dad6c8336797cc26e1e8df98d
    target_directory: library_licenses_2/github.com/apache/thrift
  - url: https://raw.githubusercontent.com/kch42/buzhash/master/LICENSE
    sha256: e36eb71189a6d30b09337cbf5fb5155f7286bc0e728d5fbad163723abc6b170c
    target_directory: library_licenses_2/github.com/kch42/buzhash

build:
  number: 1
  script:
    # upstream refs: https://github.com/gastownhall/beads/blob/main/docs/INSTALLING.md & https://github.com/gastownhall/beads/blob/main/.goreleaser.yml
    - go-licenses save ./cmd/bd --save_path=library_licenses --ignore=github.com/apache/arrow/go/arrow --ignore=github.com/apache/thrift/lib/go/thrift --ignore=github.com/kch42/buzhash --ignore=github.com/mattn/go-localereader
    - if: unix
      then:
        - DEFAULT_BRANCH="$(curl -s "https://api.github.com/repos/gastownhall/beads" | jq -r '.default_branch')"
        - COMMIT_HASH="$(curl -s "https://api.github.com/repos/gastownhall/beads/commits/v${{ version }}" | jq -r '.sha')"
        - SHORT_COMMIT_HASH="$(echo "${COMMIT_HASH}" | cut -c 1-7)"
        - go build -o="$PREFIX"/bin/bd -v -ldflags="-s -w -X main.Branch=${DEFAULT_BRANCH} -X main.Build=${SHORT_COMMIT_HASH} -X main.Commit=${COMMIT_HASH} -X main.Version=${{ version }}" -tags=gms_pure_go -trimpath ./cmd/bd
        # generate shell completions
        - mkdir -p "$PREFIX"/share/bash-completion/completions "$PREFIX"/share/fish/vendor_completions.d "$PREFIX"/share/zsh/site-functions
        - '"$PREFIX"/bin/bd completion bash > "$PREFIX"/share/bash-completion/completions/bd'
        - '"$PREFIX"/bin/bd completion fish > "$PREFIX"/share/fish/vendor_completions.d/bd.fish'
        - '"$PREFIX"/bin/bd completion zsh  > "$PREFIX"/share/zsh/site-functions/_bd'
        # merge library license files
        - cp -a library_licenses_2/. library_licenses/ && rm -rf library_licenses_2
    - if: win
      then:
        - for /f "usebackq delims=" %%T in (`powershell -Command "((Invoke-RestMethod 'https://api.github.com/repos/gastownhall/beads').default_branch)"`) do set DEFAULT_BRANCH=%%T
        - for /f "usebackq delims=" %%T in (`powershell -Command "((Invoke-RestMethod 'https://api.github.com/repos/gastownhall/beads/commits/v${{ version }}').sha)"`) do set COMMIT_HASH=%%T
        - set "SHORT_COMMIT_HASH=%COMMIT_HASH:~0,7%"
        - go build -o="%LIBRARY_BIN%"\bd.exe -v -ldflags="-s -w -X main.Branch=%DEFAULT_BRANCH% -X main.Build=%SHORT_COMMIT_HASH% -X main.Commit=%COMMIT_HASH% -X main.version=${{ version }}" -tags=gms_pure_go -trimpath ./cmd/bd
        # generate shell completions
        - mkdir "%LIBRARY_PREFIX%"\share\bash-completion\completions
        - mkdir "%LIBRARY_PREFIX%"\share\fish\vendor_completions.d
        - mkdir "%LIBRARY_PREFIX%"\share\zsh\site-functions
        - '"%LIBRARY_BIN%"\bd.exe completion bash > "%LIBRARY_PREFIX%"\share\bash-completion\completions\bd'
        - '"%LIBRARY_BIN%"\bd.exe completion fish > "%LIBRARY_PREFIX%"\share\fish\vendor_completions.d\bd.fish'
        - '"%LIBRARY_BIN%"\bd.exe completion zsh  > "%LIBRARY_PREFIX%"\share\zsh\site-functions\_bd'
        # merge library license files
        - robocopy library_licenses_2 library_licenses /E /MOVE

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('go-cgo') }}
    - go-licenses

tests:
  - script:
      - bd --help
      - bd --version
  - package_contents:
      bin:
        - bd
      files:
        - if: unix
          then:
            - share/bash-completion/completions/bd
            - share/fish/vendor_completions.d/bd.fish
            - share/zsh/site-functions/_bd
        - if: win
          then:
            - Library/share/bash-completion/completions/bd
            - Library/share/fish/vendor_completions.d/bd.fish
            - Library/share/zsh/site-functions/_bd
      strict: true

about:
  summary: A developer-centric issue tracker that lives in your Git repo
  description: |
    Beads (bd) is a fast, local-first CLI issue tracker designed for software
    teams and AI agents. It stores issues alongside your code in a Dolt
    (MySQL-compatible) database, supports hierarchical issues, dependencies,
    molecules (multi-step workflows), integrations with GitHub/GitLab/Jira/Linear,
    and MCP server support for AI agents.
  license: MIT
  license_file:
    - LICENSE
    - library_licenses/
  homepage: https://github.com/gastownhall/beads
  documentation: https://github.com/gastownhall/beads/tree/main/docs
  repository: https://github.com/gastownhall/beads

extra:
  recipe-maintainers:
    - maphew
    - salim-b
